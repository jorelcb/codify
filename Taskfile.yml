# Taskfile.yml - AI Context Generator v0.0.1-alpha
# Phase 0: Cleanup & Restructuring
version: '3'

vars:
  TEMPLATE_DIR: ./templates
  OUTPUT_DIR: ./output
  BIN_DIR: ./bin
  BINARY: '{{.BIN_DIR}}/ai-context-generator'
  TESTS_DIR: ./tests
  TIMESTAMP:
    sh: date -u +"%Y-%m-%dT%H:%M:%SZ"
  DATE:
    sh: date +"%Y-%m-%d"

tasks:
  default:
    desc: Show help
    cmds:
      - task: help

  help:
    desc: Mostrar ayuda completa
    cmds:
      - echo "AI CONTEXT GENERATOR v0.0.1-alpha"
      - echo "Phase 0 - Cleanup & Restructuring"
      - echo ""
      - echo "NOTA - Los comandos de generación están temporalmente deshabilitados"
      - echo "mientras se reescribe el core en Go (ver ROADMAP.md)"
      - echo ""
      - echo "Comandos disponibles"
      - echo "  task build        - Compilar binario Go"
      - echo "  task run          - Ejecutar binario"
      - echo "  task test         - Ejecutar tests Go"
      - echo "  task clean        - Limpiar binarios y cache"
      - echo ""
      - echo "  task template:list     - Listar templates disponibles"
      - echo "  task template:validate - Validar templates"
      - echo ""
      - echo "Documentación"
      - echo "  README.md        - Estado actual del proyecto"
      - echo "  ROADMAP.md       - Plan de desarrollo"
      - echo "  ESTADO_REAL.md   - Inventario técnico"
      - echo "  ARCHITECTURE.md  - Diseño arquitectónico"
      - echo ""
      - echo "Próximos pasos - Ver ROADMAP.md Fase 0"

  # ============================================================================
  # GO BUILD & RUN
  # ============================================================================

  build:
    desc: Compilar binario Go
    cmds:
      - mkdir -p {{.BIN_DIR}}
      - go build -o {{.BINARY}} ./cmd/ai-context-generator
      - echo "[OK] Binario compilado en {{.BINARY}}"

  run:
    desc: Ejecutar binario
    deps: [build]
    cmds:
      - '{{.BINARY}}'

  # ============================================================================
  # PROJECT GENERATION (TEMPORARILY DISABLED)
  # ============================================================================

  new:
    desc: "[DISABLED] Crear nuevo proyecto - En desarrollo"
    cmds:
      - echo "[DISABLED] Este comando está temporalmente deshabilitado"
      - echo ""
      - echo "[INFO] Estamos reescribiendo el generador en Go (Fase 0)"
      - echo "   Ver ROADMAP.md para el plan completo"
      - echo ""
      - echo "[INFO] Scripts bash legacy movidos a docs/legacy/"
      - echo "   (Solo para referencia histórica)"
      - exit 1

  new:quick:
    desc: "[DISABLED] Creación rápida - En desarrollo"
    cmds:
      - task: new

  clean:
    desc: Limpiar binarios y cache de Go
    cmds:
      - rm -rf {{.BIN_DIR}}
      - go clean -cache -testcache
      - echo "[OK] Binarios y cache limpiados"

  clean:all:
    desc: Limpiar todo (binarios, cache y proyectos generados)
    prompt: "¿Estás seguro? Esto eliminará binarios, cache Y proyectos generados"
    cmds:
      - task: clean
      - rm -rf {{.OUTPUT_DIR}}/*
      - echo "[OK] Todo limpiado"

  # ============================================================================
  # TEMPLATE MANAGEMENT
  # ============================================================================

  template:list:
    desc: Listar templates disponibles
    cmds:
      - echo "Templates disponibles"
      - echo ""
      - echo "Lenguajes"
      - ls -1 {{.TEMPLATE_DIR}}/languages/ 2>/dev/null | sed 's/^/  - /'
      - echo ""
      - echo "Tipos de proyecto"
      - ls -1 {{.TEMPLATE_DIR}}/types/ 2>/dev/null | sed 's/^/  - /'

  template:validate:
    desc: Validar que los templates requeridos existan
    cmds:
      - |
        echo "Validando templates..."
        missing=0

        # Verificar templates base
        for template in prompt context scaffolding interactions changelog; do
          if [ ! -f "{{.TEMPLATE_DIR}}/base/${template}.template" ]; then
            echo "[ERROR] Falta base/${template}.template"
            missing=$((missing + 1))
          fi
        done

        # Verificar Taskfiles de lenguajes
        for lang in go javascript python; do
          if [ ! -f "{{.TEMPLATE_DIR}}/scaffolding/${lang}/Taskfile.yml" ]; then
            echo "[WARN] Falta scaffolding/${lang}/Taskfile.yml"
          fi
        done

        if [ $missing -eq 0 ]; then
          echo "[OK] Templates principales validados"
        else
          echo "[ERROR] Faltan $missing templates principales"
          exit 1
        fi

  # ============================================================================
  # TESTING
  # ============================================================================

  test:
    desc: Ejecutar tests Go
    cmds:
      - echo "Ejecutando tests Go..."
      - go test ./... -v

  test:coverage:
    desc: Ejecutar tests con cobertura
    cmds:
      - echo "Ejecutando tests con cobertura..."
      - go test ./... -coverprofile=coverage.out
      - go tool cover -html=coverage.out -o coverage.html
      - echo "[OK] Reporte de cobertura generado - coverage.html"

  test:watch:
    desc: Ejecutar tests en modo watch
    cmds:
      - echo "Ejecutando tests en modo watch..."
      - echo "(Presiona Ctrl+C para detener)"
      - |
        while true; do
          clear
          go test ./... -v
          sleep 2
        done

  # ============================================================================
  # UTILITIES
  # ============================================================================

  check:dependencies:
    desc: Verificar dependencias requeridas
    cmds:
      - |
        echo "Verificando dependencias..."
        missing=""
        for cmd in go git; do
          if ! command -v $cmd &> /dev/null; then
            missing="$missing $cmd"
          fi
        done
        if [ -n "$missing" ]; then
          echo "[ERROR] Faltan dependencias $missing"
          echo "Por favor instalalas antes de continuar"
          exit 1
        fi
        echo "[OK] Todas las dependencias instaladas"
        echo "   Go version $(go version)"
        echo "   Git version $(git --version)"

  healthcheck:
    desc: Verificar que el proyecto está correctamente configurado
    cmds:
      - echo "Ejecutando verificacion de salud..."
      - task: check:dependencies
      - task: template:validate
      - |
        if [ -f "go.mod" ]; then
          echo "[OK] go.mod encontrado"
        else
          echo "[ERROR] go.mod no encontrado"
          exit 1
        fi
      - |
        if go build -o /tmp/test-build ./cmd/ai-context-generator; then
          echo "[OK] El proyecto compila correctamente"
          rm /tmp/test-build
        else
          echo "[ERROR] Error al compilar el proyecto"
          exit 1
        fi
      - |
        if go test ./... >/dev/null 2>&1; then
          echo "[OK] Tests pasan correctamente"
        else
          echo "[ERROR] Algunos tests fallan"
          exit 1
        fi
      - echo "[OK] El proyecto esta saludable"

  version:
    desc: Mostrar versión del generador
    cmds:
      - '{{.BINARY}} || task build && {{.BINARY}}'

  info:
    desc: Mostrar información del proyecto
    cmds:
      - echo "AI Context Generator - Project Info"
      - echo ""
      - echo "Version 0.0.1-alpha"
      - echo "Phase 0 (Cleanup & Restructuring)"
      - echo "Go version $(go version)"
      - echo "Task version $(task --version)"
      - echo ""
      - echo "Directorio de trabajo $(pwd)"
      - echo "Binario {{.BINARY}}"
      - echo ""
      - echo "Estado Reescribiendo en Go (ver ROADMAP.md)"
