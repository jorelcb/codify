# Taskfile.yml - Codify v1.3.0
version: '3'

vars:
  TEMPLATE_DIR: ./templates
  OUTPUT_DIR: ./output
  BIN_DIR: ./bin
  BINARY: '{{.BIN_DIR}}/codify'
  TESTS_DIR: ./tests

tasks:
  default:
    desc: Show help
    cmds:
      - task: help

  help:
    desc: Mostrar ayuda completa
    cmds:
      - echo "CODIFY v1.3.0"
      - echo ""
      - echo "Comandos disponibles"
      - echo "  task build           - Compilar binario Go"
      - echo "  task run             - Ejecutar binario"
      - echo "  task test            - Ejecutar tests Go"
      - echo "  task test:coverage   - Tests con cobertura"
      - echo "  task clean           - Limpiar binarios y cache"
      - echo ""
      - echo "  task template:list     - Listar templates disponibles"
      - echo "  task template:validate - Validar templates"
      - echo ""
      - echo "Documentacion"
      - echo "  README.md           - Descripcion del proyecto"
      - echo "  GETTING_STARTED.md  - Guia de inicio"
      - echo "  ROADMAP.md          - Plan de desarrollo"
      - echo "  ARCHITECTURE.md     - Diseno arquitectonico"

  # ============================================================================
  # GO BUILD & RUN
  # ============================================================================

  build:
    desc: Compilar binario Go
    cmds:
      - mkdir -p {{.BIN_DIR}}
      - go build -o {{.BINARY}} ./cmd/codify
      - echo "[OK] Binario compilado en {{.BINARY}}"

  run:
    desc: Ejecutar binario
    deps: [build]
    cmds:
      - '{{.BINARY}}'

  clean:
    desc: Limpiar binarios y cache de Go
    cmds:
      - rm -rf {{.BIN_DIR}}
      - go clean -cache -testcache
      - echo "[OK] Binarios y cache limpiados"

  clean:all:
    desc: Limpiar todo (binarios, cache y proyectos generados)
    prompt: "Estas seguro? Esto eliminara binarios, cache Y proyectos generados"
    cmds:
      - task: clean
      - rm -rf {{.OUTPUT_DIR}}/*
      - echo "[OK] Todo limpiado"

  # ============================================================================
  # TEMPLATE MANAGEMENT
  # ============================================================================

  template:list:
    desc: Listar templates disponibles
    cmds:
      - echo "Templates default (DDD/Clean Architecture)"
      - ls -1 {{.TEMPLATE_DIR}}/default/*.template 2>/dev/null | sed 's/^/  - /'
      - echo ""
      - echo "Templates neutral"
      - ls -1 {{.TEMPLATE_DIR}}/neutral/*.template 2>/dev/null | sed 's/^/  - /'
      - echo ""
      - echo "Templates spec"
      - ls -1 {{.TEMPLATE_DIR}}/spec/*.template 2>/dev/null | sed 's/^/  - /'

  template:validate:
    desc: Validar que los templates requeridos existan
    cmds:
      - |
        echo "Validando templates..."
        missing=0

        for preset in default neutral; do
          for template in agents context interactions; do
            if [ ! -f "{{.TEMPLATE_DIR}}/${preset}/${template}.template" ]; then
              echo "[ERROR] Falta ${preset}/${template}.template"
              missing=$((missing + 1))
            fi
          done
        done

        for template in constitution spec plan tasks; do
          if [ ! -f "{{.TEMPLATE_DIR}}/spec/${template}.template" ]; then
            echo "[ERROR] Falta spec/${template}.template"
            missing=$((missing + 1))
          fi
        done

        if [ $missing -eq 0 ]; then
          echo "[OK] Templates validados"
        else
          echo "[ERROR] Faltan $missing templates"
          exit 1
        fi

  # ============================================================================
  # TESTING
  # ============================================================================

  test:
    desc: Ejecutar tests Go
    cmds:
      - echo "Ejecutando tests Go..."
      - go test ./... -v

  test:coverage:
    desc: Ejecutar tests con cobertura
    cmds:
      - echo "Ejecutando tests con cobertura..."
      - go test ./... -coverprofile=coverage.out
      - go tool cover -html=coverage.out -o coverage.html
      - echo "[OK] Reporte de cobertura generado - coverage.html"

  test:watch:
    desc: Ejecutar tests en modo watch
    cmds:
      - echo "Ejecutando tests en modo watch..."
      - echo "(Presiona Ctrl+C para detener)"
      - |
        while true; do
          clear
          go test ./... -v
          sleep 2
        done

  # ============================================================================
  # UTILITIES
  # ============================================================================

  check:dependencies:
    desc: Verificar dependencias requeridas
    cmds:
      - |
        echo "Verificando dependencias..."
        missing=""
        for cmd in go git; do
          if ! command -v $cmd &> /dev/null; then
            missing="$missing $cmd"
          fi
        done
        if [ -n "$missing" ]; then
          echo "[ERROR] Faltan dependencias $missing"
          exit 1
        fi
        echo "[OK] Todas las dependencias instaladas"
        echo "   Go version $(go version)"
        echo "   Git version $(git --version)"

  healthcheck:
    desc: Verificar que el proyecto esta correctamente configurado
    cmds:
      - echo "Ejecutando verificacion de salud..."
      - task: check:dependencies
      - task: template:validate
      - |
        if [ -f "go.mod" ]; then
          echo "[OK] go.mod encontrado"
        else
          echo "[ERROR] go.mod no encontrado"
          exit 1
        fi
      - |
        if go build -o /tmp/test-build ./cmd/codify; then
          echo "[OK] El proyecto compila correctamente"
          rm /tmp/test-build
        else
          echo "[ERROR] Error al compilar el proyecto"
          exit 1
        fi
      - |
        if go test ./... >/dev/null 2>&1; then
          echo "[OK] Tests pasan correctamente"
        else
          echo "[ERROR] Algunos tests fallan"
          exit 1
        fi
      - echo "[OK] El proyecto esta saludable"

  version:
    desc: Mostrar version del generador
    cmds:
      - '{{.BINARY}} || task build && {{.BINARY}}'

  info:
    desc: Mostrar informacion del proyecto
    cmds:
      - echo "Codify - Project Info"
      - echo ""
      - echo "Version 1.3.0"
      - echo "Go version $(go version)"
      - echo ""
      - echo "Directorio de trabajo $(pwd)"
      - echo "Binario {{.BINARY}}"
