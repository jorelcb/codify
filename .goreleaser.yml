version: 2

builds:
  - id: ai-context-generator
    main: ./cmd/ai-context-generator
    binary: ai-context-generator
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .Date }}

archives:
  - id: default
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: jorelcb
    name: ai-context-generator
  draft: false
  prerelease: auto
  name_template: "{{ .Tag }}"

homebrew_casks:
  - name: ai-context-generator
    repository:
      owner: jorelcb
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Casks
    homepage: "https://github.com/jorelcb/ai-context-generator"
    description: "MCP server & CLI that generates context, specs, and skills for AI coding agents"
    binaries:
      - ai-context-generator
