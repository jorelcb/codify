version: 2

builds:
  - id: codify
    main: ./cmd/codify
    binary: codify
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .Date }}

archives:
  - id: default
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: jorelcb
    name: codify
  draft: false
  prerelease: auto
  name_template: "{{ .Tag }}"

brews:
  - name: codify
    repository:
      owner: jorelcb
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/jorelcb/codify"
    description: "MCP server & CLI that generates context, specs, and skills for AI coding agents"
    license: "Apache-2.0"
    install: |
      bin.install "codify"
    test: |
      system "#{bin}/codify", "--version"
