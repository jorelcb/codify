# templates/scaffolding/go/Taskfile.yml
version: '3'

vars:
  APP_NAME: '{{PROJECT_NAME}}'
  MAIN_PATH: './cmd/{{PROJECT_TYPE}}'
  BINARY_NAME: 'bin/{{PROJECT_NAME}}'
  GO_FILES:
    sh: find . -type f -name '*.go' -not -path "./vendor/*" | tr '\n' ' '
  
  # Versioning
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo "dev"
  COMMIT:
    sh: git rev-parse --short HEAD 2>/dev/null || echo "unknown"
  BUILD_TIME:
    sh: date -u +"%Y-%m-%dT%H:%M:%SZ"
  
  # Build flags
  LDFLAGS: >-
    -X 'main.Version={{.VERSION}}'
    -X 'main.Commit={{.COMMIT}}'
    -X 'main.BuildTime={{.BUILD_TIME}}'

env:
  CGO_ENABLED: '0'
  GOFLAGS: '-mod=readonly'

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list-all

  # === Development Tasks ===
  
  dev:
    desc: Run the application in development mode with live reload
    deps: [build]
    sources:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
    cmds:
      - air -c .air.toml || go run {{.MAIN_PATH}}/main.go

  run:
    desc: Run the application
    deps: [build]
    cmds:
      - '{{.BINARY_NAME}}'

  build:
    desc: Build the application
    sources:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
    generates:
      - '{{.BINARY_NAME}}'
    cmds:
      - go build -ldflags "{{.LDFLAGS}}" -o {{.BINARY_NAME}} {{.MAIN_PATH}}/main.go

  build:all:
    desc: Build for multiple platforms
    cmds:
      - task: build:linux
      - task: build:darwin
      - task: build:windows

  build:linux:
    desc: Build for Linux
    cmds:
      - GOOS=linux GOARCH=amd64 go build -ldflags "{{.LDFLAGS}}" -o {{.BINARY_NAME}}-linux-amd64 {{.MAIN_PATH}}/main.go

  build:darwin:
    desc: Build for macOS
    cmds:
      - GOOS=darwin GOARCH=amd64 go build -ldflags "{{.LDFLAGS}}" -o {{.BINARY_NAME}}-darwin-amd64 {{.MAIN_PATH}}/main.go
      - GOOS=darwin GOARCH=arm64 go build -ldflags "{{.LDFLAGS}}" -o {{.BINARY_NAME}}-darwin-arm64 {{.MAIN_PATH}}/main.go

  build:windows:
    desc: Build for Windows
    cmds:
      - GOOS=windows GOARCH=amd64 go build -ldflags "{{.LDFLAGS}}" -o {{.BINARY_NAME}}-windows-amd64.exe {{.MAIN_PATH}}/main.go

  # === Testing Tasks ===
  
  test:
    desc: Run all tests
    env:
      GO_ENV: test
    cmds:
      - go test -v -race -coverprofile=coverage.out ./...

  test:unit:
    desc: Run unit tests only
    cmds:
      - go test -v -short ./...

  test:integration:
    desc: Run integration tests
    cmds:
      - go test -v -run Integration ./tests/integration/...

  test:e2e:
    desc: Run end-to-end tests
    deps: [docker:up]
    cmds:
      - go test -v -tags=e2e ./tests/e2e/...
    defer:
      - task: docker:down

  test:coverage:
    desc: Run tests with coverage report
    cmds:
      - go test -v -race -coverprofile=coverage.out ./...
      - go tool cover -html=coverage.out -o coverage.html
      - echo "Coverage report generated at coverage.html"

  test:benchmark:
    desc: Run benchmarks
    cmds:
      - go test -bench=. -benchmem ./...

  # === Code Quality Tasks ===
  
  lint:
    desc: Run linters
    cmds:
      - golangci-lint run ./...

  fmt:
    desc: Format code
    cmds:
      - gofmt -w -s {{.GO_FILES}}
      - goimports -w {{.GO_FILES}}

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  audit:
    desc: Run security audit
    cmds:
      - go list -json -deps ./... | nancy sleuth
      - gosec ./...

  mod:tidy:
    desc: Tidy go modules
    cmds:
      - go mod tidy
      - go mod verify

  mod:download:
    desc: Download dependencies
    cmds:
      - go mod download

  mod:vendor:
    desc: Vendor dependencies
    cmds:
      - go mod vendor

  # === Code Generation Tasks ===
  
  generate:
    desc: Run all code generators
    cmds:
      - go generate ./...
      - task: generate:mocks
      - task: generate:docs

  generate:mocks:
    desc: Generate mocks for testing
    cmds:
      - |
        for interface_file in $(find internal/domain -name "*.go" -exec grep -l "^type.*interface" {} \;); do
          mockgen -source=$interface_file -destination=internal/mocks/$(basename $interface_file) -package=mocks
        done

  generate:docs:
    desc: Generate API documentation
    cmds:
      - swag init -g {{.MAIN_PATH}}/main.go -o ./docs

  generate:wire:
    desc: Generate dependency injection with Wire
    cmds:
      - wire gen ./internal/infrastructure/di

  # === Database Tasks ===
  
  db:migrate:
    desc: Run database migrations
    cmds:
      - migrate -path ./migrations -database "${DATABASE_URL}" up

  db:rollback:
    desc: Rollback last migration
    cmds:
      - migrate -path ./migrations -database "${DATABASE_URL}" down 1

  db:create:migration:
    desc: "Create a new migration: task db:create:migration -- <name>"
    vars:
      NAME: '{{index .CLI_ARGS 0}}'
    cmds:
      - migrate create -ext sql -dir ./migrations -seq {{.NAME}}

  db:seed:
    desc: Seed the database
    cmds:
      - go run scripts/seed.go

  # === Docker Tasks ===
  
  docker:build:
    desc: Build Docker image
    cmds:
      - docker build -t {{.APP_NAME}}:{{.VERSION}} -t {{.APP_NAME}}:latest .

  docker:run:
    desc: Run Docker container
    deps: [docker:build]
    cmds:
      - docker run -p 8080:8080 --env-file .env {{.APP_NAME}}:{{.VERSION}}

  docker:push:
    desc: Push Docker image to registry
    cmds:
      - docker push {{.APP_NAME}}:{{.VERSION}}
      - docker push {{.APP_NAME}}:latest

  docker:up:
    desc: Start all services with docker-compose
    cmds:
      - docker-compose up -d

  docker:down:
    desc: Stop all services
    cmds:
      - docker-compose down

  docker:logs:
    desc: Show docker-compose logs
    cmds:
      - docker-compose logs -f

  # === Observability Tasks ===
  
  otel:up:
    desc: Start OpenTelemetry collector and Jaeger
    cmds:
      - docker-compose -f docker-compose.observability.yml up -d

  otel:down:
    desc: Stop observability stack
    cmds:
      - docker-compose -f docker-compose.observability.yml down

  logs:
    desc: Tail application logs
    cmds:
      - tail -f logs/*.log

  # === Utility Tasks ===
  
  clean:
    desc: Clean build artifacts
    cmds:
      - rm -rf bin/ coverage.* *.test
      - go clean -cache -testcache -modcache

  install:tools:
    desc: Install required development tools
    cmds:
      - go install github.com/cosmtrek/air@latest
      - go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
      - go install github.com/swaggo/swag/cmd/swag@latest
      - go install github.com/golang/mock/mockgen@latest
      - go install github.com/google/wire/cmd/wire@latest
      - go install github.com/securego/gosec/v2/cmd/gosec@latest
      - curl -sSfL https://raw.githubusercontent.com/golang-migrate/migrate/master/install.sh | sh

  setup:
    desc: Setup development environment
    cmds:
      - task: install:tools
      - task: mod:download
      - cp .env.example .env
      - echo "✅ Development environment ready!"

  ci:
    desc: Run CI pipeline locally
    cmds:
      - task: lint
      - task: test
      - task: build
      - task: audit

  version:
    desc: Show version information
    cmds:
      - |
        echo "Application: {{.APP_NAME}}"
        echo "Version: {{.VERSION}}"
        echo "Commit: {{.COMMIT}}"
        echo "Build Time: {{.BUILD_TIME}}"
        echo "Go Version: $(go version)"

  help:
    desc: Show detailed help
    cmds:
      - |
        echo "{{.APP_NAME}} - Development Tasks"
        echo ""
        echo "Common workflows:"
        echo "  task setup          # First time setup"
        echo "  task dev           # Run with hot reload"
        echo "  task test          # Run all tests"
        echo "  task docker:up     # Start all services"
        echo ""
        echo "Use 'task --list-all' to see all available tasks"